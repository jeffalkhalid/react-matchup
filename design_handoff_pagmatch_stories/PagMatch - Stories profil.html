<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PagMatch — Stories de profil</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data (plain JS, runs before babel scripts) -->
<script src="stories/data.js"></script>
<script src="stories/image-slot.js"></script>

<!-- starter components + design pieces (babel) -->
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="stories/styles.jsx"></script>
<script type="text/babel" src="stories/match.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="stories/flow.jsx"></script>

<script type="text/babel" data-presets="react">
const Canvas = window.DesignCanvas;
const Section = window.DCSection;
const Artboard = window.DCArtboard;
const Frame = window.StoryFrame;
const STYLES = window.STORY_STYLES;
const Proto = window.ShareFlowPrototype;
const useTw = window.useTweaks;
const TwPanel = window.TweaksPanel;
const TwSection = window.TweakSection;
const TwColor = window.TweakColor;
const TwText = window.TweakText;
const TwToggle = window.TweakToggle;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#FFC11A",
  "playerName": "Jeff Khalid",
  "cta": "Rejoins-moi sur",
  "link": "pagmatch.com/jeff",
  "appUrl": "Télécharger l'app",
  "showApp": true,
  "showQR": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTw(TWEAK_DEFAULTS);

  // applique les réglages globalement (les comps lisent window.PM.*)
  window.PM.player.name = t.playerName;
  window.PM.player.initials = (t.playerName || '?').trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
  window.PM.Colors.brand = t.accent;
  window.PM.Colors.brandDeep = t.accent;
  window.PM.invite = { cta: t.cta, link: t.link, appUrl: t.appUrl, showApp: t.showApp, showQR: t.showQR };

  return (
    <React.Fragment>
    <Canvas>
      <Section id="flow" title="Flux de partage" subtitle="Profil complet → bouton Story → composer (aperçu live + sélecteur de style) → feuille de partage Instagram. Tout est cliquable.">
        <Artboard id="proto" label="Prototype iOS · tape “Story”" width={430} height={902} style={{ background: 'transparent', boxShadow: 'none', display: 'grid', placeItems: 'center' }}>
          <Proto />
        </Artboard>
      </Section>

      <Section id="styles" title="Profil — 5 styles raffinés" subtitle="Format 9:16 (1080 × 1920), vraies données du profil + charte PagMatch. À mixer librement.">
        {STYLES.map(s => {
          const Comp = s.Comp;
          return (
            <Artboard key={s.id} id={s.id} label={`${s.name} · ${s.sub}`} width={324} height={576} style={{ borderRadius: 26, background: '#000' }}>
              <Frame w={324} radius={26}><Comp player={window.PM.player} /></Frame>
            </Artboard>
          );
        })}
      </Section>

      <Section id="match" title="Résultat de match — 3 styles" subtitle="Pour partager un score juste après la partie : score géant, équipes, lieu/date et delta de niveau.">
        {window.MATCH_STYLES.map(s => {
          const Comp = s.Comp;
          return (
            <Artboard key={s.id} id={s.id} label={`${s.name} · ${s.sub}`} width={324} height={576} style={{ borderRadius: 26, background: '#000' }}>
              <Frame w={324} radius={26}><Comp match={window.PM.match} /></Frame>
            </Artboard>
          );
        })}
      </Section>

      <Section id="photo" title="Photo — façon Strava" subtitle="Ta propre photo en fond + les données en surimpression. Dépose une image sur chaque carte (ou clique) — elle est conservée.">
        {window.PHOTO_STYLES.map(s => {
          const Comp = s.Comp;
          return (
            <Artboard key={s.id} id={s.id} label={`${s.name} · ${s.sub}`} width={324} height={576} style={{ borderRadius: 26, background: '#000' }}>
              <Frame w={324} radius={26}><Comp player={window.PM.player} match={window.PM.match} /></Frame>
            </Artboard>
          );
        })}
      </Section>
    </Canvas>

    <TwPanel title="Tweaks">
      <TwSection label="Marque" />
      <TwColor label="Couleur d'accent" value={t.accent}
        options={['#FFC11A', '#34d399', '#818cf8', '#fb923c']}
        onChange={(v) => setTweak('accent', v)} />
      <TwText label="Nom du joueur" value={t.playerName} onChange={(v) => setTweak('playerName', v)} />
      <TwSection label="Invitation" />
      <TwText label="Texte d'invite" value={t.cta} onChange={(v) => setTweak('cta', v)} />
      <TwText label="Lien profil" value={t.link} onChange={(v) => setTweak('link', v)} />
      <TwText label="Lien / app" value={t.appUrl} onChange={(v) => setTweak('appUrl', v)} />
      <TwToggle label="Bouton app" value={t.showApp} onChange={(v) => setTweak('showApp', v)} />
      <TwToggle label="Afficher le QR" value={t.showQR} onChange={(v) => setTweak('showQR', v)} />
    </TwPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#0A0A0A"/>
  <rect x="34" y="20" width="32" height="60" rx="6" fill="#FFC11A"/>
  <text x="50" y="56" font-family="Anton, sans-serif" font-size="22" fill="#0A0A0A" text-anchor="middle">P</text>
</svg>
</template>
</body>
</html>
