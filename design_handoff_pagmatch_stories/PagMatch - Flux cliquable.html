<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  html, body { margin: 0; height: 100%; background: radial-gradient(circle at 50% 0%, #1c1c1f, #0a0a0a 70%); font-family: Inter, system-ui; }
  * { box-sizing: border-box; }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; overflow: hidden; }
  #scaler { transform-origin: center center; }
  #hint { position: fixed; left: 0; right: 0; bottom: 22px; text-align: center; color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600; letter-spacing: 0.3px; pointer-events: none; }
  #hint b { color: #FFC11A; }
</style>
</head>
<body>
<div id="stage"><div id="scaler"><div id="root"></div></div></div>
<div id="hint">Tape <b>📸 Story</b> · choisis <b>Profil / Match / Photo</b> · <b>Partager</b> → Instagram</div>

<script type="text/babel" src="stories/match.jsx"></script>
<script type="text/babel" src="stories/flow.jsx"></script>

<script type="text/babel" data-presets="react">
const Proto = window.ShareFlowPrototype;
ReactDOM.createRoot(document.getElementById('root')).render(<Proto />);

// redimensionne l'iPhone (402×874) pour remplir l'écran avec marge
function fit() {
  const W = 402, H = 874, m = 24;
  const s = Math.min((window.innerWidth - m) / W, (window.innerHeight - m) / H, 1.25);
  document.getElementById('scaler').style.transform = `scale(${s})`;
}
window.addEventListener('resize', fit);
setTimeout(fit, 60);
</script>

<template id="__bundler_thumbnail">

  <text x="50" y="54" font-family="Anton, sans-serif" font-size="20" fill="#0A0A0A" text-anchor="middle">▶</text>
</svg>
</template>
</body>
